<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SQUIRE-OS</title>
    <style>
        :root { --blue: #00d4ff; --bg: #050505; }
        body { background: var(--bg); color: var(--blue); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; text-transform: uppercase; }
        .hud { display: flex; flex-direction: column; height: 100vh; padding: 20px; box-sizing: border-box; border: 2px solid var(--blue); }
        .top { display: flex; justify-content: space-between; border-bottom: 1px solid var(--blue); padding-bottom: 10px; }
        .mid { flex-grow: 1; display: flex; align-items: center; justify-content: space-around; }
        #compass { width: 140px; height: 140px; border: 2px solid var(--blue); border-radius: 50%; position: relative; }
        #compass::after { content: 'N'; position: absolute; top: 5px; left: 50%; transform: translateX(-50%); font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid var(--blue); padding-top: 20px; }
        .btn { background: rgba(0, 212, 255, 0.1); color: var(--blue); border: 1px solid var(--blue); padding: 20px; text-decoration: none; text-align: center; font-size: 12px; font-weight: bold; }
        #boot-btn { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: var(--bg); color: var(--blue); border: none; font-size: 20px; font-family: inherit; cursor: pointer; }
    </style>
</head>
<body>

    <button id="boot-btn" onclick="bootSystem()">[ TAP TO INITIALIZE SUIT ]</button>

    <div class="hud">
        <div class="top">
            <div id="date">--/--/--</div>
            <div id="clock">00:00:00</div>
        </div>

        <div class="mid">
            <div style="text-align:center">
                <div id="compass"></div>
                <div id="deg" style="margin-top:10px">0°</div>
            </div>
            <div style="width:40%">
                <div style="font-size:10px">SYSTEM INTEGRITY</div>
                <div style="width:100%; height:10px; border:1px solid var(--blue); margin-top:5px">
                    <div style="width:92%; height:100%; background:var(--blue)"></div>
                </div>
            </div>
        </div>

        <div class="grid">
            <a href="shortcuts://run-shortcut?name=Status" class="btn">STATUS</a>
            <a href="shortcuts://run-shortcut?name=Location" class="btn">LOCATION</a>
            <a href="shortcuts://run-shortcut?name=Stealth" class="btn">STEALTH</a>
            <a href="shortcuts://run-shortcut?name=Suit%20Up" class="btn">RE-BOOT</a>
        </div>
    </div>

    <script>
        function bootSystem() {
            // 1. Request Compass Permission
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(response => {
                    if (response == 'granted') {
                        window.addEventListener('deviceorientation', (e) => {
                            let heading = e.webkitCompassHeading || (360 - e.alpha);
                            document.getElementById('compass').style.transform = `rotate(${-heading}deg)`;
                            document.getElementById('deg').innerText = Math.round(heading) + '°';
                        }, true);
                    }
                });
            }

            // 2. Hide the Boot Button
            document.getElementById('boot-btn').style.display = 'none';

            // 3. AUTO-RUN "Suit Up" Shortcut
            window.location.href = "shortcuts://run-shortcut?name=Suit%20Up";
        }

        function update() {
            const n = new Date();
            document.getElementById('clock').innerText = n.toLocaleTimeString([], {hour12:false});
            document.getElementById('date').innerText = n.toLocaleDateString();
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
