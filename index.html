<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ARTHUR OS MK XXV</title>
    <style>
        :root { --neon: #00d4ff; --dark: #050505; --fade: rgba(0, 212, 255, 0.1); }
        html, body { 
            position: fixed; overflow: hidden; width: 100%; height: 100%; 
            background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; text-transform: uppercase; user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Main Viewport Border */
        body::after {
            content: ''; position: fixed; inset: 10px; border: 1px solid var(--fade);
            pointer-events: none; z-index: 5000; box-sizing: border-box;
        }
        body::before {
            content: ''; position: fixed; inset: 5px; border: 2px solid var(--neon);
            clip-path: polygon(0 0, 20% 0, 25% 5%, 75% 5%, 80% 0, 100% 0, 100% 100%, 80% 100%, 75% 95%, 25% 95%, 20% 100%, 0 100%);
            opacity: 0.4; pointer-events: none; z-index: 5001;
        }

        /* Multi-Touch Ripples */
        .ripple { position: absolute; border: 2px solid var(--neon); border-radius: 50%; pointer-events: none; animation: ripple-out 0.5s ease-out; transform: translate(-50%, -50%); z-index: 9999; }
        @keyframes ripple-out { from { width: 0; height: 0; opacity: 1; } to { width: 100px; height: 100px; opacity: 0; } }

        #grid-container { position: fixed; inset: 0; perspective: 1000px; z-index: -1; }
        #ground-grid { position: absolute; width: 400%; height: 400%; top: -150%; left: -150%; background-image: linear-gradient(var(--fade) 1px, transparent 1px), linear-gradient(90deg, var(--fade) 1px, transparent 1px); background-size: 60px 60px; transform: rotateX(75deg); will-change: transform; }

        #boot-layer { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .boot-box { border: 2px solid var(--neon); padding: 50px; text-align: center; box-shadow: 0 0 20px var(--neon); background: var(--dark); }

        .hud { height: 100%; display: none; flex-direction: column; padding: 80px 30px; position: relative; box-sizing: border-box; }
        
        .compass-area { position: relative; height: 260px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .outer-ring { position: absolute; width: 230px; height: 230px; border: 1px solid var(--fade); border-radius: 50%; border-top: 3px solid var(--neon); animation: spin 10s linear infinite; }
        #mag-ring { width: 160px; height: 160px; border: 2px solid var(--neon); border-radius: 50%; position: relative; border-style: double; transition: transform 0.2s cubic-bezier(0.1, 0.3, 0.1, 1); }
        .red-ptr { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); color: #ff3333; font-size: 28px; filter: drop-shadow(0 0 5px red); }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { border: 1px solid var(--fade); padding: 15px; background: rgba(0,212,255,0.03); border-left: 4px solid var(--neon); }
        .stat-val { font-size: 18px; font-weight: bold; color: white; margin-top: 5px; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body ontouchstart="handleTouch(event)">

<div id="grid-container"><div id="ground-grid"></div></div>

<div id="boot-layer" onclick="bootSystem()">
    <div class="boot-box">
        <div style="font-size: 24px; letter-spacing: 10px;">ARTHUR</div>
        <div style="font-size: 10px; margin-top: 20px; color: white;">[ TAP TO SYNC SYSTEMS ]</div>
    </div>
</div>

<div class="hud" id="hud">
    <div style="position: absolute; top: 35px; left: 30px; right: 30px; display: flex; justify-content: space-between; font-size: 12px; letter-spacing: 2px;">
        <div id="d-ptr">--/--/----</div>
        <div id="t-ptr">00:00:00</div>
    </div>

    <div class="compass-area">
        <div class="outer-ring"></div>
        <div id="mag-ring"><div class="red-ptr">▼</div></div>
        <div id="deg-readout" style="position: absolute; font-size: 42px; font-weight: bold; color: white; text-shadow: 0 0 15px var(--neon);">0°</div>
    </div>

    <div class="data-grid">
        <div class="stat-box"><div>CURRENT VELOCITY</div><div class="stat-val" id="v-spd">0.0 MPH</div></div>
        <div class="stat-box"><div>CURRENT ALTITUDE</div><div class="stat-val" id="v-alt">0 FT</div></div>
        <div class="stat-box" style="grid-column: span 2;">
            <div>COORDINATES</div><div class="stat-val" id="v-gps" style="font-size: 13px;">LINKING...</div>
        </div>
        <div class="stat-box"><div>INTERNAL TEMP</div><div class="stat-val">23.8°C</div></div>
        <div class="stat-box"><div>SIGNAL</div><div class="stat-val" id="v-sig">STABLE</div></div>
    </div>
</div>

<script>
    let active = false, audioCtx;
    let currentHeading = 0;

    function handleTouch(e) {
        if(!active) return;
        for(let i=0; i<e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            const r = document.createElement('div');
            r.className = 'ripple'; r.style.left = t.clientX + 'px'; r.style.top = t.clientY + 'px';
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 500);
            playTone(600 + (i * 200));
        }
    }

    function playTone(f) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(0.04, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.1);
    }

    async function bootSystem() {
        if(active) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try { await DeviceOrientationEvent.requestPermission(); } catch (e) {}
        }
        active = true;
        document.getElementById('boot-layer').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        const welcome = new SpeechSynthesisUtterance("Arthur systems active.");
        window.speechSynthesis.speak(welcome);
        startSensors();
    }

    function startSensors() {
        // GPS
        navigator.geolocation.watchPosition(p => {
            document.getElementById('v-spd').innerText = (p.coords.speed * 2.237 || 0).toFixed(1) + " MPH";
            document.getElementById('v-alt').innerText = (p.coords.altitude * 3.281 || 0).toFixed(0) + " FT";
            document.getElementById('v-gps').innerText = `${p.coords.latitude.toFixed(4)}N ${p.coords.longitude.toFixed(4)}W`;
        }, null, {enableHighAccuracy: true});

        // Anti-Spasm Compass Logic
        window.addEventListener('deviceorientation', (e) => {
            let rawHeading = e.webkitCompassHeading || (360 - e.alpha);
            if (!rawHeading) return;

            // Calculate shortest rotation path
            let diff = rawHeading - (currentHeading % 360);
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            
            currentHeading += diff;

            document.getElementById('mag-ring').style.transform = `rotate(${-currentHeading}deg)`;
            document.getElementById('deg-readout').innerText = Math.round(rawHeading) + '°';
            document.getElementById('ground-grid').style.transform = `rotateX(75deg) rotateZ(${-currentHeading}deg)`;
        });
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('t-ptr').innerText = n.toLocaleTimeString([], {hour12: true});
        document.getElementById('d-ptr').innerText = n.toLocaleDateString();
    }, 1000);
</script>
</body>
</html>
