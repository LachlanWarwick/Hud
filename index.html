<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ARTHUR OS MK XX</title>
    <style>
        :root { --neon: #00d4ff; --dark: #050505; --fade: rgba(0, 212, 255, 0.2); }
        html, body { position: fixed; overflow: hidden; width: 100%; height: 100%; background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 0; text-transform: uppercase; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* The entire boot layer is now a high-priority hit zone */
        #boot-layer { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .boot-box { border: 2px solid var(--neon); padding: 50px; text-align: center; box-shadow: 0 0 20px var(--neon); background: var(--dark); pointer-events: none; }

        .hud { height: 100%; display: none; flex-direction: column; padding: 60px 20px 20px 20px; position: relative; box-sizing: border-box; }

        /* Centered Compass */
        .compass-area { position: relative; height: 180px; display: flex; align-items: center; justify-content: center; margin-top: 20px; }
        .scan-ring { position: absolute; width: 200px; height: 200px; border: 1px solid var(--fade); border-radius: 50%; border-top: 2px solid var(--neon); animation: spin 4s linear infinite; }
        #mag-ring { width: 140px; height: 140px; border: 2px solid var(--neon); border-radius: 50%; position: relative; border-style: double; }
        .red-ptr { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); color: #ff3333; font-size: 22px; }

        /* Stats */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { border: 1px solid var(--fade); padding: 10px; background: rgba(0,212,255,0.05); position: relative; }
        .stat-val { font-size: 16px; font-weight: bold; color: white; margin-top: 4px; }

        /* Tactical Tab */
        #tac-tab { position: absolute; bottom: -380px; left: 0; width: 100%; height: 460px; background: rgba(0,10,15,0.98); border-top: 2px solid var(--neon); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; padding: 15px; box-sizing: border-box; }
        #tac-tab.open { bottom: 0; }
        .handle { width: 130px; height: 35px; background: var(--neon); color: black; margin: -50px auto 10px auto; text-align: center; font-weight: bold; line-height: 35px; clip-path: polygon(15% 0, 85% 0, 100% 100%, 0 100%); }

        .game-ctrl { display: flex; gap: 8px; margin-bottom: 10px; }
        .ctrl-btn { flex: 1; border: none; padding: 12px; font-weight: bold; font-family: inherit; font-size: 11px; border-radius: 4px; }
        .k-btn { background: var(--fade); border: 1px solid var(--neon); color: var(--neon); padding: 18px; font-size: 28px; border-radius: 8px; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="bootSystem(event)">

<div id="boot-layer">
    <div class="boot-box">
        <div style="font-size: 24px; letter-spacing: 8px;">ARTHUR</div>
        <div style="font-size: 10px; margin-top: 20px; color: white;">[ TAP ANYWHERE TO SYNC ]</div>
    </div>
</div>

<div class="hud" id="hud">
    <div style="display: flex; justify-content: space-between; font-size: 10px; border-bottom: 1px solid var(--neon); padding-bottom: 5px;">
        <div id="d-ptr">15/04/2026</div>
        <div id="t-ptr">00:00:00</div>
    </div>

    <div class="compass-area">
        <div class="scan-ring"></div>
        <div id="mag-ring"><div class="red-ptr">▼</div></div>
        <div id="deg-readout" style="position: absolute; font-size: 32px; font-weight: bold; color: white;">0°</div>
    </div>

    <div class="data-grid">
        <div class="stat-box"><div>VELOCITY</div><div class="stat-val" id="v-spd">0.0 MPH</div></div>
        <div class="stat-box"><div>ALTITUDE</div><div class="stat-val" id="v-alt">0 FT</div></div>
        <div class="stat-box" style="grid-column: span 2;" onclick="requestGPS()">
            <div>COORDINATES (TAP TO RETRY)</div>
            <div class="stat-val" id="v-gps" style="font-size: 11px;">AWAITING SIGNAL</div>
        </div>
    </div>

    <div id="tac-tab">
        <div class="handle" onclick="toggleTab(event)">TACTICAL</div>
        <div class="game-ctrl">
            <button class="ctrl-btn" style="background: var(--neon); color: black;" onclick="startGame(event)">START DRILL</button>
            <button class="ctrl-btn" style="background: #ff3333; color: white;" onclick="resetTimer(event)">RESET TIMER</button>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 10px; color: #888;">
            <div>T: <span id="timer-ui" style="color:white">30.0</span></div>
            <div>C: <span id="current-ui" style="color:white">0</span></div>
            <div>H: <span id="high-ui" style="color:white">0</span></div>
        </div>
        <div id="target-ptr" style="font-size:32px; text-align:center; color:rgba(255,255,255,0.3); height:35px;"></div>
        <div id="input-ptr" style="font-size:48px; text-align:center; height:55px; color:white; display:flex; justify-content:center; gap:8px;"></div>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 200px; margin: 0 auto;">
            <div></div><button class="k-btn" onclick="gameInput('↑', event)">↑</button><div></div>
            <button class="k-btn" onclick="gameInput('←', event)">←</button>
            <button class="k-btn" onclick="gameInput('↓', event)">↓</button>
            <button class="k-btn" onclick="gameInput('→', event)">→</button>
        </div>
    </div>
</div>

<script>
    let active = false, currentScore = 0, highScore = 0, timeLeft = 30, gameRunning = false, timerInterval;
    let target = [], user = [];
    let audioCtx;

    async function bootSystem(e) {
        if(active) return;
        
        // 1. Audio Unlocking
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        await audioCtx.resume();

        // 2. Motion Sensors Unlocking
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try { await DeviceOrientationEvent.requestPermission(); } catch (err) {}
        }

        active = true;
        document.getElementById('boot-layer').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        
        // 3. Arthur Voice Initialization
        const welcome = new SpeechSynthesisUtterance("Neural link established. Welcome back, Lachlan.");
        const voices = window.speechSynthesis.getVoices();
        welcome.voice = voices.find(v => v.lang.includes('en-GB')) || voices;
        window.speechSynthesis.speak(welcome);

        // 4. Activate Listeners
        requestGPS();
        window.addEventListener('deviceorientation', (event) => {
            let h = event.webkitCompassHeading || (360 - event.alpha);
            if(h) {
                document.getElementById('mag-ring').style.transform = `rotate(${-h}deg)`;
                document.getElementById('deg-readout').innerText = Math.round(h) + '°';
            }
        });
    }

    function requestGPS() {
        document.getElementById('v-gps').innerText = "REQUESTING ACCESS...";
        navigator.geolocation.watchPosition(p => {
            document.getElementById('v-spd').innerText = (p.coords.speed * 2.237 || 0).toFixed(1) + " MPH";
            document.getElementById('v-alt').innerText = (p.coords.altitude * 3.281 || 0).toFixed(0) + " FT";
            document.getElementById('v-gps').innerText = `${p.coords.latitude.toFixed(4)}N ${p.coords.longitude.toFixed(4)}W`;
        }, (err) => {
            document.getElementById('v-gps').innerText = "SIGNAL DENIED: CHECK PRIVACY";
        }, {enableHighAccuracy: true});
    }

    function toggleTab(e) { e.stopPropagation(); document.getElementById('tac-tab').classList.toggle('open'); }

    function startGame(e) {
        e.stopPropagation(); if(gameRunning) return;
        gameRunning = true; currentScore = 0;
        document.getElementById('current-ui').innerText = "0";
        newSequence();
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            document.getElementById('timer-ui').innerText = Math.max(0, timeLeft).toFixed(1);
            if(timeLeft <= 0) { clearInterval(timerInterval); gameRunning = false; }
        }, 100);
    }

    function resetTimer(e) {
        e.stopPropagation(); clearInterval(timerInterval);
        gameRunning = false; timeLeft = 30;
        document.getElementById('timer-ui').innerText = "30.0";
        document.getElementById('input-ptr').innerText = "";
        document.getElementById('target-ptr').innerText = "";
    }

    function newSequence() {
        const icons = ['↑', '←', '↓', '→'];
        target = Array.from({length: 4}, () => icons[Math.floor(Math.random() * 4)]);
        document.getElementById('target-ptr').innerText = target.join(' ');
        document.getElementById('input-ptr').innerText = '';
        user = [];
    }

    function gameInput(dir, e) {
        e.stopPropagation(); if(!gameRunning) return;
        user.push(dir);
        document.getElementById('input-ptr').innerText = user.join(' ');
        if (user[user.length-1] !== target[user.length-1]) {
            user = [];
            document.getElementById('input-ptr').style.color = 'red';
            setTimeout(() => { document.getElementById('input-ptr').innerText = ''; document.getElementById('input-ptr').style.color = 'white'; }, 200);
        } else if (user.length === target.length) {
            currentScore++;
            document.getElementById('current-ui').innerText = currentScore;
            if(currentScore > highScore) { highScore = currentScore; document.getElementById('high-ui').innerText = highScore; }
            document.getElementById('input-ptr').style.color = 'yellow';
            setTimeout(newSequence, 300);
        }
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('t-ptr').innerText = n.toLocaleTimeString([], {hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true});
    }, 1000);
</script>
</body>
</html>
