<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQUIRE-OS MK V</title>
    <style>
        :root { --neon: #00d4ff; --dark: #050505; --fade: rgba(0, 212, 255, 0.1); }
        body { background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; text-transform: uppercase; }
        
        /* Boot Screen */
        #boot-layer { position: fixed; inset: 0; background: var(--dark); z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; }
        .glitch-border { border: 2px solid var(--neon); padding: 30px; box-shadow: 0 0 15px var(--neon); text-align: center; }

        /* Main HUD */
        .hud { height: 100vh; display: flex; flex-direction: column; padding: 15px; visibility: hidden; border: 1px solid var(--fade); }
        .top-bar { display: flex; justify-content: space-between; border-bottom: 1px solid var(--neon); padding-bottom: 5px; font-size: 14px; font-weight: bold; }

        /* Fancy Compass */
        .compass-wrap { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .ring { position: absolute; width: 220px; height: 220px; border: 1px dashed var(--neon); border-radius: 50%; opacity: 0.3; }
        #mag-ring { width: 180px; height: 180px; border: 2px solid var(--neon); border-radius: 50%; position: relative; border-style: double; transition: transform 0.1s linear; }
        #mag-ring::before { content: '▼'; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); }
        #mag-ring::after { content: 'N'; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-weight: bold; }
        #deg-readout { position: absolute; font-size: 38px; font-weight: bold; text-shadow: 0 0 10px var(--neon); pointer-events: none; }

        /* Middle Data Sector */
        .data-sector { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .box { border: 1px solid var(--fade); padding: 8px; background: rgba(0,212,255,0.03); }
        .lbl { font-size: 9px; opacity: 0.6; margin-bottom: 3px; }
        .val { font-size: 14px; font-weight: bold; letter-spacing: 1px; }

        /* Bottom Grid */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: var(--fade); border: 1px solid var(--neon); color: var(--neon); padding: 18px; text-align: center; text-decoration: none; font-size: 11px; font-weight: bold; clip-path: polygon(0 0, 90% 0, 100% 30%, 100% 100%, 10% 100%, 0 70%); }
        .btn:active { background: var(--neon); color: black; }
    </style>
</head>
<body>

<div id="boot-layer" onclick="initializeSuit()">
    <div class="glitch-border">
        <div>[ LINK STATUS: DISCONNECTED ]</div>
        <div style="font-size: 10px; margin-top: 15px;">TAP TO SYNC NEURAL INTERFACE</div>
    </div>
</div>

<div class="hud" id="main-interface">
    <div class="top-bar">
        <div id="date-display">--/--/--</div>
        <div id="clock-display">12:00:00 PM</div>
    </div>

    <div class="compass-wrap">
        <div class="ring" style="width: 260px; height: 260px; animation: spin 20s linear infinite;"></div>
        <div id="mag-ring"></div>
        <div id="deg-readout">0°</div>
    </div>

    <div class="data-sector">
        <div class="box">
            <div class="lbl">VELOCITY (MPH)</div>
            <div class="val" id="speed-val">0.0</div>
        </div>
        <div class="box">
            <div class="lbl">ALTITUDE (FT)</div>
            <div class="val" id="alt-val">----</div>
        </div>
        <div class="box" style="grid-column: span 2;">
            <div class="lbl">COORDINATE GRID</div>
            <div class="val" id="coord-val">SEARCHING FOR SATELLITE...</div>
        </div>
    </div>

    <div class="btn-grid">
        <a href="shortcuts://run-shortcut?name=Status" class="btn">STATUS SCAN</a>
        <a href="shortcuts://run-shortcut?name=Location" class="btn">GEO-MAP</a>
        <a href="shortcuts://run-shortcut?name=Stealth" class="btn">STEALTH</a>
        <a href="shortcuts://run-shortcut?name=Suit%20Up" class="btn">RE-BOOT</a>
    </div>
</div>

<script>
    const tts = window.speechSynthesis;
    
    function speak(text) {
        const utter = new SpeechSynthesisUtterance(text);
        const voices = tts.getVoices();
        // Look for British Male (Arthur/Daniel)
        utter.voice = voices.find(v => v.lang.includes('en-GB') && v.name.includes('Male')) || voices.find(v => v.lang.includes('en-GB'));
        utter.rate = 1.0;
        utter.pitch = 0.85;
        tts.speak(utter);
    }

    function initializeSuit() {
        // Voice Greeting
        speak("Welcome back, Lachlan. All systems online.");

        // Sensor Permission (iOS/Chrome)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission();
        }

        // GPS Tracking
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(updateSensors, null, { enableHighAccuracy: true });
        }

        // Interface Flip
        document.getElementById('boot-layer').style.display = 'none';
        document.getElementById('main-interface').style.visibility = 'visible';
    }

    function updateSensors(pos) {
        const s = pos.coords.speed || 0;
        document.getElementById('speed-val').innerText = (s * 2.237).toFixed(1);
        document.getElementById('alt-val').innerText = pos.coords.altitude ? (pos.coords.altitude * 3.281).toFixed(0) : "0";
        document.getElementById('coord-val').innerText = `${pos.coords.latitude.toFixed(4)} N / ${pos.coords.longitude.toFixed(4)} W`;
    }

    function syncTime() {
        const n = new Date();
        document.getElementById('clock-display').innerText = n.toLocaleTimeString([], {hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true});
        document.getElementById('date-display').innerText = n.toLocaleDateString();
    }

    window.addEventListener('deviceorientation', (e) => {
        let h = e.webkitCompassHeading || (360 - e.alpha);
        if(h) {
            document.getElementById('mag-ring').style.transform = `rotate(${-h}deg)`;
            document.getElementById('deg-readout').innerText = Math.round(h) + '°';
        }
    });

    setInterval(syncTime, 1000);
</script>

<style>
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</body>
</html>
