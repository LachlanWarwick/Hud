<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ARTHUR OS MK XVII</title>
    <style>
        :root { --neon: #00d4ff; --dark: #050505; --fade: rgba(0, 212, 255, 0.2); }
        
        /* DISABLE SCROLLING */
        html, body { 
            position: fixed; overflow: hidden; width: 100%; height: 100%; 
            touch-action: none; -webkit-overflow-scrolling: none;
        }

        body { background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; text-transform: uppercase; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        .ripple { position: absolute; border: 2px solid var(--neon); border-radius: 50%; pointer-events: none; animation: ripple-out 0.4s ease-out; transform: translate(-50%, -50%); z-index: 9999; }
        @keyframes ripple-out { from { width: 0; height: 0; opacity: 1; } to { width: 80px; height: 80px; opacity: 0; } }

        #boot-layer { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .boot-box { border: 2px solid var(--neon); padding: 40px; text-align: center; box-shadow: 0 0 15px var(--neon); background: var(--dark); }

        .hud { height: 100vh; display: none; flex-direction: column; padding: 25px; position: relative; box-sizing: border-box; }

        .compass-area { position: relative; height: 160px; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        .scan-ring { position: absolute; width: 200px; height: 200px; border: 1px solid var(--fade); border-radius: 50%; border-top: 2px solid var(--neon); animation: spin 4s linear infinite; }
        .zero-mark { position: absolute; top: -20px; color: white; font-weight: bold; font-size: 14px; }
        #mag-ring { width: 140px; height: 140px; border: 2px solid var(--neon); border-radius: 50%; position: relative; border-style: double; transition: none; }
        .red-ptr { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); color: #ff3333; font-size: 22px; }

        #tac-tab { 
            position: absolute; bottom: -340px; left: 0; width: 100%; height: 460px; 
            background: rgba(0,10,15,0.98); border-top: 2px solid var(--neon); 
            transition: 0.3s ease-out; z-index: 100; padding: 20px; box-sizing: border-box;
        }
        #tac-tab.open { bottom: 0; }
        .handle { width: 120px; height: 35px; background: var(--neon); color: black; margin: -55px auto 10px auto; text-align: center; font-weight: bold; line-height: 35px; clip-path: polygon(15% 0, 85% 0, 100% 100%, 0 100%); }

        .game-ctrl { display: flex; gap: 10px; margin-bottom: 10px; }
        .ctrl-btn { flex: 1; background: var(--neon); color: black; border: none; padding: 10px; font-weight: bold; font-family: inherit; font-size: 11px; }
        
        .score-row { display: grid; grid-template-columns: 1fr 1fr 1fr; font-size: 10px; margin-bottom: 10px; text-align: center; color: #aaa; }
        .target-box { font-size: 36px; text-align: center; color: rgba(255, 255, 255, 0.4); margin-bottom: 5px; height: 40px; letter-spacing: 5px; }
        .input-box { font-size: 52px; text-align: center; height: 65px; color: white; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        .k-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 220px; margin: 10px auto; }
        .k-btn { background: var(--fade); border: 1px solid var(--neon); color: var(--neon); padding: 20px; font-size: 30px; border-radius: 8px; }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: auto; padding-bottom: 80px; }
        .stat-box { border: 1px solid var(--fade); padding: 12px; background: rgba(0,212,255,0.05); }
        .stat-val { font-size: 18px; font-weight: bold; color: white; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body onmousedown="handleTap(event)">

<div id="boot-layer" onclick="bootSystem()">
    <div class="boot-box">
        <div style="font-size: 22px; letter-spacing: 6px;">ARTHUR OS</div>
        <div style="font-size: 10px; margin-top: 20px; opacity: 0.6;">[ TAP TO SYNC ]</div>
    </div>
</div>

<div class="hud" id="hud">
    <div style="display: flex; justify-content: space-between; font-size: 11px; border-bottom: 1px solid var(--neon); padding-bottom: 5px;">
        <div id="d-ptr"></div>
        <div id="t-ptr"></div>
    </div>

    <div class="compass-area">
        <div class="scan-ring"></div>
        <div class="zero-mark">0</div>
        <div id="mag-ring"><div class="red-ptr">▼</div></div>
        <div id="deg-readout" style="position: absolute; font-size: 32px; font-weight: bold; color: white;">0°</div>
    </div>

    <div class="data-grid">
        <div class="stat-box"><div>VELOCITY</div><div class="stat-val" id="v-spd">0.0 MPH</div></div>
        <div class="stat-box"><div>ALTITUDE</div><div class="stat-val" id="v-alt">0 FT</div></div>
        <div class="stat-box" style="grid-column: span 2;"><div>COORDINATES</div><div class="stat-val" id="v-gps" style="font-size: 13px;">SEARCHING...</div></div>
    </div>

    <div id="tac-tab">
        <div class="handle" onclick="toggleTab(event)">TACTICAL</div>
        <div class="game-ctrl">
            <button class="ctrl-btn" onclick="startGame(event)">START DRILL</button>
            <button class="ctrl-btn" style="background: #ff3333;" onclick="resetTimer(event)">RESET TIMER</button>
        </div>
        
        <div class="score-row">
            <div>TIMER: <span id="timer-ui" style="color:white;">30.0</span>s</div>
            <div>CURRENT: <span id="current-ui" style="color:white;">0</span></div>
            <div>HIGH: <span id="high-ui" style="color:white;">0</span></div>
        </div>
        
        <div id="target-ptr" class="target-box"></div>
        <div id="input-ptr" class="input-box"></div>
        
        <div class="k-grid">
            <div></div><button class="k-btn" onclick="gameInput('↑', event)">↑</button><div></div>
            <button class="k-btn" onclick="gameInput('←', event)">←</button>
            <button class="k-btn" onclick="gameInput('↓', event)">↓</button>
            <button class="k-btn" onclick="gameInput('→', event)">→</button>
        </div>
    </div>
</div>

<script>
    let active = false, currentScore = 0, highScore = 0, timeLeft = 30, gameRunning = false, timerInterval;
    let target = [], user = [];
    const tts = window.speechSynthesis;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Prevent scrolling and bouncing
    document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });

    function handleTap(e) {
        const ripple = document.createElement('div');
        ripple.className = 'ripple'; ripple.style.left = e.clientX + 'px'; ripple.style.top = e.clientY + 'px';
        document.body.appendChild(ripple);
        setTimeout(() => ripple.remove(), 400);
        if(active) playSound(1000);
    }

    function playSound(f) {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.1);
    }

    async function bootSystem() {
        if(active) return; active = true;
        audioCtx.resume();
        document.getElementById('boot-layer').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        
        // Voice Trigger
        const welcome = new SpeechSynthesisUtterance("Welcome back, Lachlan. All systems online.");
        let voices = tts.getVoices();
        welcome.voice = voices.find(v => v.lang.includes('en-GB')) || voices;
        tts.speak(welcome);

        // MOTION PERMISSION
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            const resp = await DeviceOrientationEvent.requestPermission();
            if (resp === 'granted') window.addEventListener('deviceorientation', handleOrientation);
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
        }

        // GPS PERMISSION
        navigator.geolocation.watchPosition(p => {
            document.getElementById('v-spd').innerText = (p.coords.speed * 2.237 || 0).toFixed(1) + " MPH";
            document.getElementById('v-alt').innerText = (p.coords.altitude * 3.281 || 0).toFixed(0) + " FT";
            document.getElementById('v-gps').innerText = `${p.coords.latitude.toFixed(4)}N ${p.coords.longitude.toFixed(4)}W`;
        }, (err) => {
            document.getElementById('v-gps').innerText = "LOCATION OFF";
        }, {enableHighAccuracy: true});
    }

    function handleOrientation(e) {
        let h = e.webkitCompassHeading || (360 - e.alpha);
        if(h) {
            document.getElementById('mag-ring').style.transform = `rotate(${-h}deg)`;
            document.getElementById('deg-readout').innerText = Math.round(h) + '°';
        }
    }

    function toggleTab(e) { e.stopPropagation(); document.getElementById('tac-tab').classList.toggle('open'); }

    function startGame(e) {
        e.stopPropagation();
        if(gameRunning) return;
        gameRunning = true;
        currentScore = 0;
        document.getElementById('current-ui').innerText = "0";
        newSequence();
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            document.getElementById('timer-ui').innerText = Math.max(0, timeLeft).toFixed(1);
            if(timeLeft <= 0) { clearInterval(timerInterval); gameRunning = false; }
        }, 100);
    }

    function resetTimer(e) {
        e.stopPropagation();
        clearInterval(timerInterval);
        gameRunning = false;
        timeLeft = 30;
        document.getElementById('timer-ui').innerText = "30.0";
        document.getElementById('input-ptr').innerText = "";
    }

    function newSequence() {
        const icons = ['↑', '←', '↓', '→'];
        target = Array.from({length: 4}, () => icons[Math.floor(Math.random() * 4)]);
        document.getElementById('target-ptr').innerText = target.join(' ');
        document.getElementById('input-ptr').innerText = '';
        user = [];
    }

    function gameInput(dir, e) {
        e.stopPropagation();
        if(!gameRunning) return;
        user.push(dir);
        document.getElementById('input-ptr').innerText = user.join(' ');
        if (user[user.length-1] !== target[user.length-1]) {
            user = [];
            document.getElementById('input-ptr').style.color = 'red';
            setTimeout(() => { document.getElementById('input-ptr').innerText = ''; document.getElementById('input-ptr').style.color = 'white'; }, 200);
        } else if (user.length === target.length) {
            currentScore++;
            document.getElementById('current-ui').innerText = currentScore;
            if(currentScore > highScore) {
                highScore = currentScore;
                document.getElementById('high-ui').innerText = highScore;
            }
            document.getElementById('input-ptr').style.color = 'yellow';
            playSound(1500);
            setTimeout(newSequence, 300);
        }
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('t-ptr').innerText = n.toLocaleTimeString([], {hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true});
        document.getElementById('d-ptr').innerText = n.toLocaleDateString();
    }, 1000);
</script>
</body>
</html>
