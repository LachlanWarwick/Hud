<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQUIRE-OS MK VI</title>
    <style>
        :root { --neon: #00d4ff; --dark: #050505; --fade: rgba(0, 212, 255, 0.1); }
        body { background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; text-transform: uppercase; }
        
        #boot-layer { position: fixed; inset: 0; background: var(--dark); z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; }
        .hud { height: 100vh; display: flex; flex-direction: column; padding: 15px; visibility: hidden; }

        /* Compass: FIXED SPASM */
        .compass-wrap { position: relative; display: flex; align-items: center; justify-content: center; height: 180px; }
        #mag-ring { 
            width: 150px; height: 150px; border: 2px solid var(--neon); border-radius: 50%; 
            position: relative; border-style: double;
            /* NO TRANSITION HERE = NO SPASM */
        }
        #mag-ring::before { content: '▲'; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); }
        #deg-readout { position: absolute; font-size: 28px; font-weight: bold; }

        /* Stratagem Mini-Game */
        .game-box { border: 1px solid var(--neon); margin: 10px 0; padding: 10px; text-align: center; background: rgba(0,0,0,0.8); }
        .arrows { font-size: 24px; letter-spacing: 10px; min-height: 30px; }
        .key-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 120px; margin: 5px auto; }
        .k-btn { border: 1px solid var(--neon); background: var(--fade); color: var(--neon); padding: 5px; font-size: 12px; cursor: pointer; }

        .data-sector { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .box { border: 1px solid var(--fade); padding: 5px; background: rgba(0,212,255,0.03); font-size: 11px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: var(--fade); border: 1px solid var(--neon); color: var(--neon); padding: 15px; text-align: center; text-decoration: none; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="boot-layer" onclick="initializeSuit()">
    <div style="border: 2px solid var(--neon); padding: 30px; text-align: center;">
        <div>[ LINK STATUS: OFFLINE ]</div>
        <div style="font-size: 10px; margin-top: 15px;">TAP TO INITIALIZE</div>
    </div>
</div>

<div class="hud" id="main-interface">
    <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--neon); padding-bottom: 5px; font-size: 12px;">
        <div id="date-display"></div>
        <div id="clock-display"></div>
    </div>

    <div class="compass-wrap">
        <div id="mag-ring"></div>
        <div id="deg-readout">0°</div>
    </div>

    <div class="game-box">
        <div style="font-size: 9px; margin-bottom: 5px;">STRATAGEM TRAINING</div>
        <div id="target-arrows" style="color: grey;">W A S D</div>
        <div id="input-arrows" class="arrows"></div>
        <div class="key-pad">
            <button class="k-btn" onclick="playGame('W')">↑</button>
            <span></span>
            <button class="k-btn" onclick="playGame('A')">←</button>
            <button class="k-btn" onclick="playGame('S')">↓</button>
            <button class="k-btn" onclick="playGame('D')">→</button>
        </div>
    </div>

    <div class="data-sector">
        <div class="box">L-VEL: <span id="speed-val">0.0</span> MPH</div>
        <div class="box">ALT: <span id="alt-val">0</span> FT</div>
        <div class="box" style="grid-column: span 2; font-size: 9px;" id="coord-val">SIGNAL SEARCHING...</div>
    </div>

    <div class="btn-grid">
        <a href="shortcuts://run-shortcut?name=Status" class="btn">STATUS</a>
        <a href="shortcuts://run-shortcut?name=Location" class="btn">GEO-MAP</a>
        <a href="shortcuts://run-shortcut?name=Stealth" class="btn">STEALTH</a>
        <a href="shortcuts://run-shortcut?name=Suit%20Up" class="btn">RE-BOOT</a>
    </div>
</div>

<script>
    const tts = window.speechSynthesis;
    let targetPattern = [];
    let userPattern = [];

    function generatePattern() {
        const keys = ['W', 'A', 'S', 'D'];
        targetPattern = Array.from({length: 4}, () => keys[Math.floor(Math.random() * 4)]);
        document.getElementById('target-arrows').innerText = targetPattern.join(' ');
        document.getElementById('input-arrows').innerText = '';
        userPattern = [];
    }

    function playGame(key) {
        userPattern.push(key);
        document.getElementById('input-arrows').innerText = userPattern.join(' ');
        if (userPattern[userPattern.length-1] !== targetPattern[userPattern.length-1]) {
            userPattern = [];
            document.getElementById('input-arrows').style.color = 'red';
            setTimeout(() => { document.getElementById('input-arrows').style.color = var(--neon); document.getElementById('input-arrows').innerText = ''; }, 300);
        } else if (userPattern.length === targetPattern.length) {
            document.getElementById('input-arrows').style.color = 'yellow';
            setTimeout(() => { 
                document.getElementById('input-arrows').style.color = 'white';
                generatePattern(); 
            }, 500);
        }
    }

    function initializeSuit() {
        const utter = new SpeechSynthesisUtterance("Welcome back, Lachlan. All systems online.");
        const voices = tts.getVoices();
        utter.voice = voices.find(v => v.lang.includes('en-GB') && v.name.includes('Male')) || voices.find(v => v.lang.includes('en-GB'));
        tts.speak(utter);

        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission();
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(p => {
                document.getElementById('speed-val').innerText = (p.coords.speed * 2.237 || 0).toFixed(1);
                document.getElementById('alt-val').innerText = (p.coords.altitude * 3.281 || 0).toFixed(0);
                document.getElementById('coord-val').innerText = `${p.coords.latitude.toFixed(4)} N / ${p.coords.longitude.toFixed(4)} W`;
            }, null, { enableHighAccuracy: true });
        }

        document.getElementById('boot-layer').style.display = 'none';
        document.getElementById('main-interface').style.visibility = 'visible';
        generatePattern();
    }

    window.addEventListener('deviceorientation', (e) => {
        let h = e.webkitCompassHeading || (360 - e.alpha);
        if(h) {
            document.getElementById('mag-ring').style.transform = `rotate(${-h}deg)`;
            document.getElementById('deg-readout').innerText = Math.round(h) + '°';
        }
    });

    setInterval(() => {
        const n = new Date();
        document.getElementById('clock-display').innerText = n.toLocaleTimeString([], {hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true});
        document.getElementById('date-display').innerText = n.toLocaleDateString();
    }, 1000);
</script>
</body>
</html>
