<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ARTHUR OS MK XXXI</title>
    <style>
        :root { --neon: #00d4ff; --dark: #050505; --fade: rgba(0, 212, 255, 0.1); }
        html, body { 
            position: fixed; overflow: hidden; width: 100%; height: 100%; 
            background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; text-transform: uppercase; user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Tactical Frame */
        body::before {
            content: ''; position: fixed; inset: 5px; border: 2px solid var(--neon);
            clip-path: polygon(0 0, 20% 0, 25% 5%, 75% 5%, 80% 0, 100% 0, 100% 100%, 80% 100%, 75% 95%, 25% 95%, 20% 100%, 0 100%);
            opacity: 0.3; pointer-events: none; z-index: 5001;
        }

        .ripple { position: absolute; border: 2px solid var(--neon); border-radius: 50%; pointer-events: none; animation: ripple-out 0.5s ease-out; transform: translate(-50%, -50%); z-index: 9999; }
        @keyframes ripple-out { from { width: 0; height: 0; opacity: 1; } to { width: 100px; height: 100px; opacity: 0; } }

        #grid-container { position: fixed; inset: 0; perspective: 1000px; z-index: -1; }
        #ground-grid { position: absolute; width: 400%; height: 400%; top: -150%; left: -150%; background-image: linear-gradient(var(--fade) 1px, transparent 1px), linear-gradient(90deg, var(--fade) 1px, transparent 1px); background-size: 60px 60px; transform: rotateX(75deg); }

        #boot-layer { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .boot-box { border: 2px solid var(--neon); padding: 50px; text-align: center; box-shadow: 0 0 20px var(--neon); background: var(--dark); }

        .hud { height: 100%; display: none; flex-direction: column; padding: 110px 30px 40px 30px; position: relative; box-sizing: border-box; }
        
        /* Header Fix: Portrait = L/R | Landscape = Left Stack */
        .header-info { 
            position: absolute; top: 75px; left: 35px; right: 35px; 
            display: flex; justify-content: space-between; 
            font-size: 11px; letter-spacing: 1px; transition: 0.3s ease;
        }

        @media (orientation: landscape) {
            .hud { flex-direction: row; align-items: center; justify-content: space-around; padding: 60px; }
            .header-info { flex-direction: column; align-items: flex-start; top: 45px; left: 45px; gap: 5px; }
            .compass-area { width: 40%; }
            .data-grid-container { width: 45%; }
        }

        .compass-area { position: relative; height: 240px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .outer-ring { position: absolute; width: 220px; height: 220px; border: 1px solid var(--fade); border-radius: 50%; border-top: 3px solid var(--neon); animation: spin 10s linear infinite; }
        #mag-ring { width: 150px; height: 150px; border: 2px solid var(--neon); border-radius: 50%; position: relative; border-style: double; transition: transform 0.2s cubic-bezier(0.1, 0.3, 0.1, 1); }
        .red-ptr { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); color: #ff3333; font-size: 28px; }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box { border: 1px solid var(--fade); padding: 12px; background: rgba(0,212,255,0.02); border-left: 3px solid var(--neon); }
        .stat-val { font-size: 16px; font-weight: bold; color: white; margin-top: 4px; }

        /* Transparent Blue Throb Core */
        .soul-container {
            position: relative; width: 140px; height: 90px; margin: 15px auto 0 auto;
            display: flex; align-items: center; justify-content: center;
        }
        .throb-orb {
            position: absolute; border-radius: 50%;
            background: radial-gradient(circle, rgba(0,212,255,0.6) 0%, rgba(0,100,255,0) 70%);
            mix-blend-mode: screen; filter: blur(10px);
        }
        .t-1 { width: 50px; height: 50px; animation: throb-a 2.5s infinite ease-in-out; }
        .t-2 { width: 70px; height: 40px; animation: throb-b 3.5s infinite ease-in-out; opacity: 0.5; }
        .t-3 { width: 40px; height: 60px; animation: throb-c 4.5s infinite ease-in-out; opacity: 0.3; }

        @keyframes throb-a { 0%, 100% { transform: scale(1) translate(0,0); } 50% { transform: scale(1.5) translate(5px, -5px); } }
        @keyframes throb-b { 0%, 100% { transform: scale(1) translate(0,0); } 50% { transform: scale(1.3) translate(-10px, 5px); } }
        @keyframes throb-c { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.8) rotate(45deg); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body ontouchstart="handleTouch(event)">

<div id="grid-container"><div id="ground-grid"></div></div>

<div id="boot-layer" onclick="bootSystem()">
    <div class="boot-box">
        <div style="font-size: 24px; letter-spacing: 10px;">ARTHUR</div>
        <div style="font-size: 10px; margin-top: 20px;">[ INITIALIZE LINK ]</div>
    </div>
</div>

<div class="hud" id="hud">
    <div class="header-info">
        <div id="d-ptr">--/--/----</div>
        <div id="t-ptr">00:00:00</div>
    </div>

    <div class="compass-area">
        <div class="outer-ring"></div>
        <div id="mag-ring"><div class="red-ptr">▼</div></div>
        <div id="deg-readout" style="position: absolute; font-size: 42px; font-weight: bold; color: white; text-shadow: 0 0 15px var(--neon);">0°</div>
    </div>

    <div class="data-grid-container">
        <div class="data-grid">
            <div class="stat-box"><div>VELOCITY</div><div class="stat-val" id="v-spd">0.0 MPH</div></div>
            <div class="stat-box"><div>ALTITUDE</div><div class="stat-val" id="v-alt">0 FT</div></div>
            <div class="stat-box" style="grid-column: span 2;">
                <div>COORDINATES</div><div class="stat-val" id="v-gps" style="font-size: 12px;">ACQUIRING...</div>
            </div>
            <div class="stat-box"><div>TEMP</div><div class="stat-val">23.8°C</div></div>
            <div class="stat-box"><div>SIGNAL</div><div class="stat-val" id="v-sig">STABLE</div></div>
        </div>

        <div style="text-align: center; margin-top: 25px; font-size: 9px; letter-spacing: 5px; opacity: 0.4;">ARTHUR</div>
        <div class="soul-container">
            <div class="throb-orb t-1"></div>
            <div class="throb-orb t-2"></div>
            <div class="throb-orb t-3"></div>
        </div>
    </div>
</div>

<script>
    let active = false, audioCtx, currentHeading = 0;

    function handleTouch(e) {
        if(!active) return;
        for(let i=0; i<e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            const r = document.createElement('div');
            r.className = 'ripple'; r.style.left = t.clientX + 'px'; r.style.top = t.clientY + 'px';
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 500);
            playTone(600 + (i * 120));
        }
    }

    function playTone(f) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(0.02, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.1);
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        // Alex is standard Male 2 on most iOS/Mac systems
        const alex = voices.find(v => v.name.includes('Alex')) || voices.find(v => v.lang.includes('en-US') && v.name.includes('Male'));
        if(alex) msg.voice = alex;
        msg.pitch = 0.9;
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }

    async function bootSystem() {
        if(active) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try { await DeviceOrientationEvent.requestPermission(); } catch (e) {}
        }
        active = true;
        document.getElementById('boot-layer').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        // Voice requires a slight delay to load voices list
        setTimeout(() => speak("Arthur systems online. Neural link established."), 100);
        startSensors();
    }

    function startSensors() {
        navigator.geolocation.watchPosition(p => {
            document.getElementById('v-spd').innerText = (p.coords.speed * 2.237 || 0).toFixed(1) + " MPH";
            document.getElementById('v-alt').innerText = (p.coords.altitude * 3.281 || 0).toFixed(0) + " FT";
            document.getElementById('v-gps').innerText = `${p.coords.latitude.toFixed(4)}N ${p.coords.longitude.toFixed(4)}W`;
        }, null, {enableHighAccuracy: true});

        window.addEventListener('deviceorientation', (e) => {
            let rawHeading = e.webkitCompassHeading || (360 - e.alpha);
            if (!rawHeading) return;
            let diff = rawHeading - (currentHeading % 360);
            if (diff > 180) diff -= 360; if (diff < -180) diff += 360;
            currentHeading += diff;
            document.getElementById('mag-ring').style.transform = `rotate(${-currentHeading}deg)`;
            document.getElementById('deg-readout').innerText = Math.round(rawHeading) + '°';
        });
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('t-ptr').innerText = n.toLocaleTimeString([], {hour12: true});
        document.getElementById('d-ptr').innerText = n.toLocaleDateString();
    }, 1000);
</script>
</body>
</html>
