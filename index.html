<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ARTHUR OS MK XXIV</title>
    <style>
        :root { --neon: #00d4ff; --dark: #050505; --fade: rgba(0, 212, 255, 0.1); }
        html, body { position: fixed; overflow: hidden; width: 100%; height: 100%; background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 0; text-transform: uppercase; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* Multi-Touch Ripples */
        .ripple { position: absolute; border: 2px solid var(--neon); border-radius: 50%; pointer-events: none; animation: ripple-out 0.5s cubic-bezier(0, 0, 0.2, 1); transform: translate(-50%, -50%); z-index: 9999; box-shadow: 0 0 10px var(--neon); }
        @keyframes ripple-out { from { width: 0; height: 0; opacity: 1; } to { width: 120px; height: 120px; opacity: 0; } }

        #grid-container { position: fixed; inset: 0; perspective: 1000px; z-index: -1; pointer-events: none; }
        #ground-grid { position: absolute; width: 400%; height: 400%; top: -150%; left: -150%; background-image: linear-gradient(var(--fade) 1px, transparent 1px), linear-gradient(90deg, var(--fade) 1px, transparent 1px); background-size: 60px 60px; transform: rotateX(75deg); will-change: transform; transition: transform 0.2s ease-out; }

        #boot-layer { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .boot-box { border: 2px solid var(--neon); padding: 50px; text-align: center; box-shadow: 0 0 20px var(--neon); background: var(--dark); }

        .hud { height: 100%; display: none; flex-direction: column; padding: 60px 20px; position: relative; box-sizing: border-box; }
        
        @media (orientation: landscape) {
            .hud { flex-direction: row; align-items: center; justify-content: space-around; padding: 20px 80px; }
            .data-grid { width: 45%; margin-top: 0; }
            .compass-area { width: 40%; }
            #tac-tab { width: 60% !important; left: 20% !important; }
        }

        .compass-area { position: relative; height: 240px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .outer-ring { position: absolute; width: 220px; height: 220px; border: 1px solid var(--fade); border-radius: 50%; border-left: 4px solid var(--neon); animation: spin 10s linear infinite; }
        #mag-ring { width: 150px; height: 150px; border: 2px solid var(--neon); border-radius: 50%; position: relative; border-style: double; box-shadow: inset 0 0 20px var(--fade); }
        .red-ptr { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); color: #ff3333; font-size: 26px; filter: drop-shadow(0 0 8px #ff3333); }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { border: 1px solid var(--fade); padding: 12px; background: rgba(0,212,255,0.03); backdrop-filter: blur(2px); }
        .stat-val { font-size: 16px; font-weight: bold; color: white; margin-top: 4px; letter-spacing: 1px; }

        #tac-tab { position: absolute; bottom: -380px; left: 0; width: 100%; height: 460px; background: rgba(0,10,15,0.96); border-top: 2px solid var(--neon); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; padding: 15px; box-sizing: border-box; }
        #tac-tab.open { bottom: 0; }
        .handle { width: 140px; height: 35px; background: var(--neon); color: black; margin: -50px auto 10px auto; text-align: center; font-weight: bold; line-height: 35px; clip-path: polygon(10% 0, 90% 0, 100% 100%, 0 100%); }

        .k-btn { background: var(--fade); border: 1px solid var(--neon); color: var(--neon); padding: 15px; font-size: 24px; border-radius: 8px; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body ontouchstart="handleTouch(event)">

<div id="grid-container"><div id="ground-grid"></div></div>

<div id="boot-layer" onclick="bootSystem()">
    <div class="boot-box">
        <div style="font-size: 24px; letter-spacing: 8px;">ARTHUR</div>
        <div style="font-size: 10px; margin-top: 20px;">[ TAP TO INITIALIZE ]</div>
    </div>
</div>

<div class="hud" id="hud">
    <div style="position: absolute; top: 20px; width: calc(100% - 40px); display: flex; justify-content: space-between; font-size: 10px; opacity: 0.8;">
        <div id="d-ptr">--/--/----</div>
        <div id="t-ptr">00:00:00</div>
    </div>

    <div class="compass-area" onclick="requestCompass()">
        <div class="outer-ring"></div>
        <div id="mag-ring"><div class="red-ptr">▼</div></div>
        <div id="deg-readout" style="position: absolute; font-size: 36px; font-weight: bold; color: white; text-shadow: 0 0 15px var(--neon);">0°</div>
        <div style="position: absolute; bottom: 20px; font-size: 8px; color: var(--neon); opacity: 0.5;">CALIBRATE</div>
    </div>

    <div class="data-grid">
        <div class="stat-box"><div>CURRENT VELOCITY</div><div class="stat-val" id="v-spd">0.0 MPH</div></div>
        <div class="stat-box"><div>CURRENT ALTITUDE</div><div class="stat-val" id="v-alt">0 FT</div></div>
        <div class="stat-box" style="grid-column: span 2;">
            <div>COORDINATES</div><div class="stat-val" id="v-gps" style="font-size: 11px;">ACQUIRING...</div>
        </div>
        <div class="stat-box"><div>INTERNAL TEMP</div><div class="stat-val" id="v-temp">24.1°C</div></div>
        <div class="stat-box"><div>SIGNAL</div><div class="stat-val" id="v-sig">LINKING</div></div>
    </div>

    <div id="tac-tab">
        <div class="handle" onclick="toggleTab(event)">TACTICAL</div>
        <div style="display: flex; gap: 8px; margin-bottom: 10px;">
            <button style="flex:1; background:var(--neon); color:black; border:none; padding:12px; font-family:inherit; font-weight:bold; border-radius:4px;" onclick="startGame(event)">START DRILL</button>
            <button style="flex:1; background:#ff3333; color:white; border:none; padding:12px; font-family:inherit; font-weight:bold; border-radius:4px;" onclick="resetTimer(event)">RESET</button>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px;">
            <div>TIMER: <span id="timer-ui">30.0</span></div>
            <div>SCORE: <span id="current-ui">0</span></div>
            <div>HIGH: <span id="high-ui">0</span></div>
        </div>
        <div id="target-ptr" style="font-size:24px; text-align:center; color:rgba(255,255,255,0.2); height:30px;"></div>
        <div id="input-ptr" style="font-size:32px; text-align:center; height:40px; color:white; display:flex; justify-content:center; gap:8px;"></div>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 180px; margin: 0 auto;">
            <div></div><button class="k-btn" onclick="gameInput('↑', event)">↑</button><div></div>
            <button class="k-btn" onclick="gameInput('←', event)">←</button>
            <button class="k-btn" onclick="gameInput('↓', event)">↓</button>
            <button class="k-btn" onclick="gameInput('→', event)">→</button>
        </div>
    </div>
</div>

<script>
    let active = false, currentScore = 0, highScore = 0, timeLeft = 30, gameRunning = false, timerInterval;
    let target = [], user = [];
    let audioCtx;

    // Multi-Touch & Multi-Sound
    function handleTouch(e) {
        if(!active) return;
        const touches = e.changedTouches;
        for(let i=0; i<touches.length; i++) {
            createRipple(touches[i].clientX, touches[i].clientY);
            playBeep(800 + (i * 100));
        }
    }

    function createRipple(x, y) {
        const r = document.createElement('div');
        r.className = 'ripple'; r.style.left = x + 'px'; r.style.top = y + 'px';
        document.body.appendChild(r);
        setTimeout(() => r.remove(), 500);
    }

    function playBeep(freq) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.05, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.1);
    }

    async function bootSystem() {
        if(active) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try { await DeviceOrientationEvent.requestPermission(); } catch (e) {}
        }
        active = true;
        document.getElementById('boot-layer').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        const welcome = new SpeechSynthesisUtterance("Arthur online. Multi-link synchronized.");
        window.speechSynthesis.speak(welcome);
        requestGPS();
        requestCompass();
    }

    function requestCompass() {
        window.addEventListener('deviceorientation', (e) => {
            let h = e.webkitCompassHeading || (360 - e.alpha);
            if(h) {
                document.getElementById('mag-ring').style.transform = `rotate(${-h}deg)`;
                document.getElementById('deg-readout').innerText = Math.round(h) + '°';
                document.getElementById('ground-grid').style.transform = `rotateX(75deg) rotateZ(${-h}deg)`;
            }
        }, {once: false});
    }

    function requestGPS() {
        navigator.geolocation.watchPosition(p => {
            document.getElementById('v-spd').innerText = (p.coords.speed * 2.237 || 0).toFixed(1) + " MPH";
            document.getElementById('v-alt').innerText = (p.coords.altitude * 3.281 || 0).toFixed(0) + " FT";
            document.getElementById('v-gps').innerText = `${p.coords.latitude.toFixed(4)}N ${p.coords.longitude.toFixed(4)}W`;
            document.getElementById('v-sig').innerText = "STABLE";
            // Randomize temp slightly to simulate live calculation
            document.getElementById('v-temp').innerText = (23 + Math.random()).toFixed(1) + "°C";
        }, null, {enableHighAccuracy: true});
    }

    function toggleTab(e) { e.stopPropagation(); document.getElementById('tac-tab').classList.toggle('open'); }
    function startGame(e) { e.stopPropagation(); if(gameRunning) return; gameRunning = true; currentScore = 0; timeLeft = 30; newSequence(); timerInterval = setInterval(() => { timeLeft -= 0.1; document.getElementById('timer-ui').innerText = Math.max(0, timeLeft).toFixed(1); if(timeLeft <= 0) { clearInterval(timerInterval); gameRunning = false; } }, 100); }
    function resetTimer(e) { e.stopPropagation(); clearInterval(timerInterval); gameRunning = false; timeLeft = 30; document.getElementById('timer-ui').innerText = "30.0"; document.getElementById('input-ptr').innerText = ""; document.getElementById('target-ptr').innerText = ""; }
    function newSequence() { const icons = ['↑', '←', '↓', '→']; target = Array.from({length: 4}, () => icons[Math.floor(Math.random() * 4)]); document.getElementById('target-ptr').innerText = target.join(' '); document.getElementById('input-ptr').innerText = ''; user = []; }
    function gameInput(dir, e) { e.stopPropagation(); if(!gameRunning) return; user.push(dir); document.getElementById('input-ptr').innerText = user.join(' '); if (user[user.length-1] !== target[user.length-1]) { user = []; document.getElementById('input-ptr').style.color = 'red'; setTimeout(() => { document.getElementById('input-ptr').innerText = ''; document.getElementById('input-ptr').style.color = 'white'; }, 200); } else if (user.length === target.length) { currentScore++; document.getElementById('current-ui').innerText = currentScore; if(currentScore > highScore) { highScore = currentScore; document.getElementById('high-ui').innerText = highScore; } document.getElementById('input-ptr').style.color = 'yellow'; setTimeout(newSequence, 300); } }
    
    setInterval(() => {
        const n = new Date();
        document.getElementById('t-ptr').innerText = n.toLocaleTimeString([], {hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true});
        document.getElementById('d-ptr').innerText = n.toLocaleDateString();
    }, 1000);
</script>
</body>
</html>
