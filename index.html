<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQUIRE-OS MK III</title>
    <style>
        :root { --blue: #00d4ff; --bg: #050505; --low: rgba(0, 212, 255, 0.1); }
        body { background: var(--bg); color: var(--blue); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; text-transform: uppercase; }
        .frame { height: 100vh; display: flex; flex-direction: column; padding: 15px; border: 2px solid var(--blue); box-sizing: border-box; }
        
        /* Top Header */
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--blue); padding-bottom: 5px; font-size: 14px; }
        
        /* New Tactical Compass */
        .compass-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #ring { width: 160px; height: 160px; border: 2px solid var(--blue); border-radius: 50%; position: relative; border-style: double; }
        #ring::before { content: ''; position: absolute; top: -10px; left: 50%; width: 2px; height: 20px; background: var(--blue); transform: translateX(-50%); }
        #deg-val { font-size: 32px; font-weight: bold; margin-top: 15px; text-shadow: 0 0 10px var(--blue); }

        /* Health Metrics */
        .vitals { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat { border: 1px solid var(--low); padding: 10px; background: rgba(0,0,0,0.5); }
        .label { font-size: 10px; color: rgba(0, 212, 255, 0.6); }
        .val { font-size: 18px; }
        .pulse { animation: beat 0.8s infinite; color: #ff3333; }
        @keyframes beat { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        /* Panel Buttons */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .pnl { background: var(--low); border: 1px solid var(--blue); color: var(--blue); padding: 18px; text-align: center; text-decoration: none; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<div class="frame">
    <div class="header">
        <div id="date">--/--/--</div>
        <div id="time">12:00:00 PM</div>
    </div>

    <div class="compass-area">
        <div id="ring"></div>
        <div id="deg-val">0°</div>
    </div>

    <div class="vitals">
        <div class="stat">
            <div class="label">NEURAL PULSE</div>
            <div class="val"><span class="pulse">●</span> <span id="bpm">72</span> BPM</div>
        </div>
        <div class="stat">
            <div class="label">PEDOMETER</div>
            <div class="val" id="steps">0412 STPS</div>
        </div>
    </div>

    <div class="controls">
        <a href="shortcuts://run-shortcut?name=Status" class="pnl">STATUS</a>
        <a href="shortcuts://run-shortcut?name=Location" class="pnl">LOCATION</a>
        <a href="shortcuts://run-shortcut?name=Stealth" class="pnl">STEALTH</a>
        <a href="shortcuts://run-shortcut?name=Suit%20Up" class="pnl">RE-BOOT</a>
    </div>
</div>

<script>
    function updateHUD() {
        const now = new Date();
        // 12-Hour Clock Format
        document.getElementById('time').innerText = now.toLocaleTimeString([], {hour: 'numeric', minute:'2-digit', second:'2-digit', hour12: true});
        document.getElementById('date').innerText = now.toLocaleDateString();
        
        // Simulating Heart Rate variance
        document.getElementById('bpm').innerText = Math.floor(Math.random() * 5) + 70;
    }
    setInterval(updateHUD, 1000);

    window.addEventListener('deviceorientation', (e) => {
        let h = e.webkitCompassHeading || (360 - e.alpha);
        if(h) {
            document.getElementById('ring').style.transform = `rotate(${-h}deg)`;
            document.getElementById('deg-val').innerText = Math.round(h) + '°';
        }
    });

    // Tap anywhere to unlock orientation (Required for iOS)
    document.body.onclick = () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission();
        }
    };
</script>
</body>
</html>
