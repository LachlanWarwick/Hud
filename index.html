<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ARTHUR OS MK XXXVIII</title>
    <style>
        :root { --neon: #00d4ff; --dark: #050505; --fade: rgba(0, 212, 255, 0.1); }
        
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; }
        html, body { position: fixed; overflow: hidden; width: 100%; height: 100%; background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 0; text-transform: uppercase; }
        
        body::before {
            content: ''; position: fixed; inset: 5px; border: 2px solid var(--neon);
            clip-path: polygon(0 0, 20% 0, 25% 5%, 75% 5%, 80% 0, 100% 0, 100% 100%, 80% 100%, 75% 95%, 25% 95%, 20% 100%, 0 100%);
            opacity: 0.3; pointer-events: none; z-index: 5001;
        }

        #grid-container { position: fixed; inset: 0; perspective: 1000px; z-index: -1; }
        #ground-grid { position: absolute; width: 400%; height: 400%; top: -150%; left: -150%; background-image: linear-gradient(var(--fade) 1px, transparent 1px), linear-gradient(90deg, var(--fade) 1px, transparent 1px); background-size: 60px 60px; transform: rotateX(75deg); transition: transform 0.5s cubic-bezier(0.1, 0.3, 0.1, 1); }

        #boot-layer { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .boot-box { border: 2px solid var(--neon); padding: 50px; text-align: center; box-shadow: 0 0 20px var(--neon); background: var(--dark); }

        .hud { height: 100%; display: none; flex-direction: column; padding: 110px 30px 40px 30px; position: relative; box-sizing: border-box; }
        
        .header-info { position: absolute; top: 75px; left: 35px; right: 35px; display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 1px; }

        @media (orientation: landscape) {
            .hud { flex-direction: row; align-items: center; justify-content: space-around; padding: 60px; }
            .header-info { flex-direction: column; align-items: flex-start; top: 45px; left: 45px; gap: 5px; }
            .compass-area { width: 40%; margin-bottom: 0; }
            .data-grid-container { width: 45%; }
        }

        .compass-area { position: relative; height: 240px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .outer-ring { position: absolute; width: 220px; height: 220px; border: 1px solid var(--fade); border-radius: 50%; border-top: 3px solid var(--neon); animation: spin 10s linear infinite; }
        #mag-ring { width: 150px; height: 150px; border: 2px solid var(--neon); border-radius: 50%; position: relative; border-style: double; transition: transform 0.2s cubic-bezier(0.1, 0.3, 0.1, 1); }
        .red-ptr { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); color: #ff3333; font-size: 28px; }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box { border: 1px solid var(--fade); padding: 12px; background: rgba(0,212,255,0.02); border-left: 3px solid var(--neon); }
        .stat-val { font-size: 16px; font-weight: bold; color: white; margin-top: 4px; }

        #interaction-overlay { position: absolute; bottom: 160px; left: 50%; transform: translateX(-50%); display: none; flex-direction: row; gap: 15px; z-index: 7000; }
        .hud-btn { background: rgba(0, 212, 255, 0.15); border: 1px solid var(--neon); color: var(--neon); padding: 10px 20px; font-family: 'Courier New', monospace; font-size: 10px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.2s; }
        .hud-btn:active { background: var(--neon); color: var(--dark); }

        .soul-container { position: relative; width: 140px; height: 90px; margin: 15px auto 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 6000; }
        .throb-orb { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(0,212,255,0.7) 0%, rgba(0,100,255,0) 70%); mix-blend-mode: screen; filter: blur(12px); pointer-events: none; }
        .t-1 { width: 65px; height: 65px; animation: throb-a 2.5s infinite ease-in-out; }
        .t-2 { width: 90px; height: 50px; animation: throb-b 3.5s infinite ease-in-out; opacity: 0.6; }
        .t-3 { width: 45px; height: 80px; animation: throb-c 4.5s infinite ease-in-out; opacity: 0.4; }

        @keyframes throb-a { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.6); } }
        @keyframes throb-b { 0%, 100% { transform: scale(1) translate(0,0); } 50% { transform: scale(1.3) translate(15px, -10px); } }
        @keyframes throb-c { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.4) rotate(90deg); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="grid-container"><div id="ground-grid"></div></div>

<div id="boot-layer" onclick="bootSystem()">
    <div class="boot-box">
        <div style="font-size: 24px; letter-spacing: 10px;">ARTHUR</div>
        <div style="font-size: 10px; margin-top: 20px;">[ INITIALIZE CORE ]</div>
    </div>
</div>

<div class="hud" id="hud">
    <div id="interaction-overlay">
        <button class="hud-btn" onclick="handleInput('YES')">CONFIRM</button>
        <button class="hud-btn" onclick="handleInput('NO')">DECLINE</button>
    </div>

    <div class="header-info">
        <div id="d-ptr">--/--/----</div>
        <div id="t-ptr">00:00:00</div>
    </div>

    <div class="compass-area">
        <div class="outer-ring"></div>
        <div id="mag-ring"><div class="red-ptr">▼</div></div>
        <div id="deg-readout" style="position: absolute; font-size: 42px; font-weight: bold; color: white;">0°</div>
    </div>

    <div class="data-grid-container">
        <div class="data-grid">
            <div class="stat-box"><div>VELOCITY</div><div class="stat-val" id="v-spd">0.0 MPH</div></div>
            <div class="stat-box"><div>ALTITUDE</div><div class="stat-val" id="v-alt">0 FT</div></div>
            <div class="stat-box" style="grid-column: span 2;"><div>COORDINATES</div><div class="stat-val" id="v-gps" style="font-size: 11px;">SYNCING...</div></div>
            <div class="stat-box"><div>TEMP</div><div class="stat-val">23.8°C</div></div>
            <div class="stat-box"><div>SIGNAL</div><div class="stat-val">STABLE</div></div>
        </div>

        <div style="text-align: center; margin-top: 25px; font-size: 9px; letter-spacing: 5px; opacity: 0.4;">ARTHUR</div>
        <div class="soul-container" onclick="triggerArthurAssistant()">
            <div class="throb-orb t-1"></div>
            <div class="throb-orb t-2"></div>
            <div class="throb-orb t-3"></div>
        </div>
    </div>
</div>

<script>
    let active = false, currentHeading = 0, awaitingResponse = false;

    function triggerArthurAssistant() {
        if(!active || awaitingResponse) return;
        // Arthur now "communicates" silently by prompting the HUD buttons
        // 30% chance to trigger a query interaction
        if(Math.random() > 0.7) {
            awaitingResponse = true;
            document.getElementById('interaction-overlay').style.display = 'flex';
        }
    }

    function handleInput(choice) {
        document.getElementById('interaction-overlay').style.display = 'none';
        awaitingResponse = false;
        // Logic for silent confirmation can go here
    }

    async function bootSystem() {
        if(active) return;
        if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
            try { await DeviceOrientationEvent.requestPermission(); } catch (e) {}
        }
        active = true;
        document.getElementById('boot-layer').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        startSensors();
    }

    function startSensors() {
        navigator.geolocation.watchPosition(p => {
            document.getElementById('v-spd').innerText = (p.coords.speed * 2.237 || 0).toFixed(1) + " MPH";
            document.getElementById('v-alt').innerText = (p.coords.altitude * 3.281 || 0).toFixed(0) + " FT";
            document.getElementById('v-gps').innerText = `${p.coords.latitude.toFixed(4)}N ${p.coords.longitude.toFixed(4)}W`;
        });
        window.addEventListener('deviceorientation', (e) => {
            let rawHeading = e.webkitCompassHeading || (360 - e.alpha);
            let diff = rawHeading - (currentHeading % 360);
            if (diff > 180) diff -= 360; if (diff < -180) diff += 360;
            currentHeading += diff;
            document.getElementById('mag-ring').style.transform = `rotate(${-currentHeading}deg)`;
            document.getElementById('deg-readout').innerText = Math.round(rawHeading) + '°';
            document.getElementById('ground-grid').style.transform = `rotateX(75deg) rotateZ(${-currentHeading}deg)`;
        });
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('t-ptr').innerText = n.toLocaleTimeString([], {hour12: true});
        document.getElementById('d-ptr').innerText = n.toLocaleDateString();
    }, 1000);
</script>
</body>
</html>
